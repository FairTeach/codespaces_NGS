name: env_GC
# Recommended channel order: defaults first, then conda-forge, then bioconda.
# This mirrors the guidance in the practical documentation and helps the
# solver pick compatible builds for core libraries like htslib.
channels:
  - defaults
  - conda-forge
  - bioconda
dependencies:
  - samtools
  - bowtie2
  - igv
  - freebayes
  - vcflib
  - bedtools
  - blast
  # tabixpp is sometimes hard to resolve due to tight htslib/libdeflate pins.
  # If solver still fails, try replacing `tabixpp` with `htslib` and `tabix` or
  # remove it and install later via conda-forge/bioconda separately.
  - tabixpp
